name: namaha-web

on:
  push:
    branches:
      - stage2

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Rsync files to server
        run: |
          rsync -avz --delete \
          --exclude=".git" \
          --exclude="node_modules" \
          -e "ssh -o StrictHostKeyChecking=no" \
          ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST_TEST }}:/var/lib/projects/namaha-web

      - name: Build & Run Docker on Server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST_TEST }} << 'EOF'
          cd /var/lib/projects/namaha-web
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          sudo mkdir -p /var/lib/projects/backups
          sudo docker save namaha-web:latest -o /var/lib/projects/backups/namaha-web-$TIMESTAMP.tar
          sudo docker system prune -af
          sudo docker build -t namaha-web:latest .
          sudo docker compose up -d
          EOF
